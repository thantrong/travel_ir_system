# System configuration
app:
  name: "travel_ir_system"
  debug: false

database:
  mongodb_uri: "YOUR_MONGODB_URI_HERE" # Set private URI locally, do not commit credentials
  db_name: "travel_ir"
  collections:
    places: "places"
    reviews: "reviews"
    queries: "queries"
    evaluation_metrics: "evaluation_metrics"

crawler:
  traveloka:
    cities_file: "config/cities.yaml" # quản lý danh sách tỉnh/thành ở file riêng
    delay: 3
    scroll_delay: 1
    headless: true # headless dễ bị Traveloka chặn, ưu tiên ổn định
    timeout: 60000
    max_concurrent_cities: 2 # chạy tuần tự từng city để giảm bị chặn
    max_concurrent_hotels: 2 # ưu tiên ổn định (gần v1), có thể tăng 3 sau
    block_resource_types: ["image", "media", "font"] # giảm nhiệt/cpu/network
    cooldown_every_hotels: 6
    cooldown_seconds: 20
    fast_crawl: false
    fast_min_delay_seconds: 0.2
    fast_max_delay_seconds: 0.8
    skip_idle_seconds: 20
    detail_task_timeout_seconds: 45 # timeout cứng cho mỗi tab hotel detail, tránh treo tab
    city_task_timeout_seconds: 300 # timeout mỗi city, quá lâu sẽ bỏ để không treo worker
    use_region_workers: false # đã tắt worker, ưu tiên crawl tuần tự ổn định
    max_hotels_per_city: 1 # giới hạn đang chạy (tăng lên 100 khi crawl full)
    max_reviews_per_hotel: 5 # giới hạn đang chạy (tăng lên 100 khi crawl full)
    proxy:
      enabled: false
      rotate_per_run: true
      list:
        # Điền proxy thật theo format Playwright:
        # - server: "http://IP:PORT"
        #   username: "user"   # optional
        #   password: "pass"   # optional
        - server: "http://127.0.0.1:8080"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"

nlp:
  stopwords_file: "config/stopwords.txt"
  language: "vi"

retrieval:
  algorithm: "bm25"
  top_k: 10
