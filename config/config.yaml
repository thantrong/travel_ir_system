# System configuration
app:
  name: "travel_ir_system"
  debug: false

database:
  mongodb_uri: "mongodb+srv://thanvinhtrongsv:Trong1532000@dbtest.vsj0kew.mongodb.net/?appName=DBTest" # Set private URI locally, do not commit credentials
  db_name: "travel_ir"
  collections:
    places: "places"
    reviews: "reviews"

crawler:
  traveloka:
    cities_file: "config/cities.yaml" # quản lý danh sách tỉnh/thành ở file riêng
    delay: 3
    headless: false # headless dễ bị Traveloka chặn, ưu tiên ổn định
    timeout: 60000
    max_concurrent_cities: 1 # chạy tuần tự từng city để giảm bị chặn
    max_concurrent_hotels: 6 # ưu tiên ổn định, có thể tăng 3 sau
    block_resource_types: ["image", "media", "font"] # giảm nhiệt/cpu/network
    cooldown_every_hotels: 6
    cooldown_seconds: 20
    skip_idle_seconds: 20
    detail_task_timeout_seconds: 45 # timeout cứng cho mỗi tab hotel detail, tránh treo tab
    city_task_timeout_seconds: 1000 # timeout mỗi city, quá lâu sẽ bỏ để không treo worker

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"

nlp:
  stopwords_file: "config/stopwords.txt"
  language: "vi"

retrieval:
  algorithm: "bm25"
  top_k: 10
